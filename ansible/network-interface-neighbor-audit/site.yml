---
- name: Audit multi-vendor interfaces and neighbors
  hosts: all
  gather_facts: false
  vars:
    network_vendor_aliases:
      ios: cisco_ios
      cisco_ios: cisco_ios
      nxos: cisco_nxos
      cisco_nxos: cisco_nxos
      huawei: huawei_ce
      huawei_ce: huawei_ce
      h3c: h3c_cli
      h3c_cli: h3c_cli
      f5: f5_bigip
      f5_bigip: f5_bigip
    normalized_vendor: >-
      {{
        network_vendor_aliases.get(
          (network_vendor | default(vendor_family | default(''))) | lower,
          (network_vendor | default(vendor_family | default(''))) | lower
        )
      }}
    cisco_ios_interface_commands: "{{ cisco_ios_commands | default(['show interfaces status', 'show ip interface brief', 'show lldp neighbors detail']) }}"
    cisco_nxos_interface_commands: "{{ cisco_nxos_commands | default(['show interface brief', 'show interface status', 'show lldp neighbors detail']) }}"
    huawei_ce_interface_commands: "{{ huawei_ce_commands | default(['display interface brief', 'display ip interface brief', 'display lldp neighbor brief']) }}"
    h3c_cli_interface_commands: "{{ h3c_cli_commands | default(['display interface brief', 'display ip interface brief', 'display lldp neighbor-information list']) }}"
    f5_interface_gather_subset: "{{ f5_interface_subset | default(['interfaces', 'vlans', 'self-ips', 'trunks', 'virtual-servers']) }}"
    f5_provider:
      server: "{{ ansible_host | default(inventory_hostname) }}"
      user: "{{ ansible_user }}"
      password: "{{ ansible_password }}"
      validate_certs: "{{ f5_validate_certs | default(false) }}"
    selected_show_commands: "{{ lookup('vars', normalized_vendor ~ '_interface_commands', default=[]) }}"
  tasks:
    - name: Ensure the requested vendor family is supported
      ansible.builtin.assert:
        that:
          - normalized_vendor in ['cisco_ios', 'cisco_nxos', 'huawei_ce', 'h3c_cli', 'f5_bigip']
        fail_msg: >-
          Unsupported vendor_family={{ vendor_family | default(network_vendor | default('unset')) }}.

    - name: Run Cisco IOS interface audit commands
      cisco.ios.ios_command:
        commands: "{{ selected_show_commands }}"
      register: cli_result
      changed_when: false
      when: normalized_vendor == 'cisco_ios'

    - name: Run Cisco NX-OS interface audit commands
      cisco.nxos.nxos_command:
        commands: "{{ selected_show_commands }}"
      register: cli_result
      changed_when: false
      when: normalized_vendor == 'cisco_nxos'

    - name: Run Huawei interface audit commands
      community.network.ce_command:
        commands: "{{ selected_show_commands }}"
      register: cli_result
      changed_when: false
      when: normalized_vendor == 'huawei_ce'

    - name: Run H3C interface audit commands through generic CLI
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      loop: "{{ selected_show_commands }}"
      register: h3c_cli_result
      changed_when: false
      when: normalized_vendor == 'h3c_cli'

    - name: Collect F5 interface-related information
      f5networks.f5_modules.bigip_device_info:
        gather_subset: "{{ f5_interface_gather_subset }}"
        provider: "{{ f5_provider }}"
      delegate_to: localhost
      register: f5_info
      when: normalized_vendor == 'f5_bigip'

    - name: Print CLI interface audit summary
      ansible.builtin.debug:
        msg:
          vendor_family: "{{ normalized_vendor }}"
          inventory_host: "{{ inventory_hostname }}"
          commands: "{{ selected_show_commands }}"
          stdout_lines: >-
            {{
              cli_result.stdout_lines
              if normalized_vendor in ['cisco_ios', 'cisco_nxos', 'huawei_ce']
              else (h3c_cli_result.results | map(attribute='stdout_lines') | list)
            }}
      when: normalized_vendor != 'f5_bigip'

    - name: Print F5 interface audit summary
      ansible.builtin.debug:
        msg:
          vendor_family: "{{ normalized_vendor }}"
          inventory_host: "{{ inventory_hostname }}"
          interfaces: "{{ f5_info.interfaces | default([]) }}"
          vlans: "{{ f5_info.vlans | default([]) }}"
          self_ips: "{{ f5_info.self_ips | default([]) }}"
          trunks: "{{ f5_info.trunks | default([]) }}"
          virtual_servers: "{{ f5_info.virtual_servers | default([]) }}"
      when: normalized_vendor == 'f5_bigip'
