[switches]
# Cisco IOS / IOS-XE switch
switch-ios-access-01 ansible_host=192.0.2.10 vendor_family=cisco_ios ansible_connection=network_cli ansible_network_os=cisco.ios.ios ansible_user=ops ansible_password=changeme ansible_command_timeout=120

# Cisco NX-OS switch
switch-nxos-leaf-01 ansible_host=192.0.2.11 vendor_family=cisco_nxos ansible_connection=network_cli ansible_network_os=cisco.nxos.nxos ansible_user=ops ansible_password=changeme ansible_command_timeout=120

# Huawei CloudEngine switch
switch-huawei-ce-01 ansible_host=192.0.2.20 vendor_family=huawei_ce ansible_connection=network_cli ansible_network_os=community.network.ce ansible_user=ops ansible_password=changeme ansible_command_timeout=120

# H3C / Comware switch
switch-h3c-core-01 ansible_host=192.0.2.21 vendor_family=h3c_cli ansible_connection=network_cli ansible_network_os=ansible.netcommon.default ansible_user=ops ansible_password=changeme ansible_command_timeout=120
