---
- name: Backup multi-vendor network configuration
  hosts: all
  gather_facts: false
  vars:
    network_vendor_aliases:
      ios: cisco_ios
      cisco_ios: cisco_ios
      nxos: cisco_nxos
      cisco_nxos: cisco_nxos
      huawei: huawei_ce
      huawei_ce: huawei_ce
      h3c: h3c_cli
      h3c_cli: h3c_cli
      f5: f5_bigip
      f5_bigip: f5_bigip
    normalized_vendor: >-
      {{
        network_vendor_aliases.get(
          (network_vendor | default(vendor_family | default(''))) | lower,
          (network_vendor | default(vendor_family | default(''))) | lower
        )
      }}
    network_backup_dir_resolved: "{{ network_backup_dir | default('./artifacts/network-backups') }}"
    network_backup_tag_resolved: "{{ network_backup_tag | default('oneops') }}"
    network_backup_filename: "{{ inventory_hostname }}-{{ network_backup_tag_resolved }}.cfg"
    h3c_backup_command: "{{ h3c_backup_command | default('display current-configuration') }}"
    f5_backup_commands: "{{ f5_backup_commands | default(['show sys version', 'list /net self one-line', 'list /net vlan one-line', 'list /ltm pool one-line', 'list /ltm virtual one-line']) }}"
    f5_provider:
      server: "{{ ansible_host | default(inventory_hostname) }}"
      user: "{{ ansible_user }}"
      password: "{{ ansible_password }}"
      validate_certs: "{{ f5_validate_certs | default(false) }}"
  tasks:
    - name: Ensure local backup directory exists
      ansible.builtin.file:
        path: "{{ network_backup_dir_resolved }}"
        state: directory
        mode: "0755"
      delegate_to: localhost

    - name: Ensure the requested vendor family is supported
      ansible.builtin.assert:
        that:
          - normalized_vendor in ['cisco_ios', 'cisco_nxos', 'huawei_ce', 'h3c_cli', 'f5_bigip']
        fail_msg: >-
          Unsupported vendor_family={{ vendor_family | default(network_vendor | default('unset')) }}.

    - name: Backup Cisco IOS running configuration
      cisco.ios.ios_config:
        backup: true
        backup_options:
          dir_path: "{{ network_backup_dir_resolved }}"
          filename: "{{ network_backup_filename }}"
      register: backup_result
      when: normalized_vendor == 'cisco_ios'

    - name: Backup Cisco NX-OS running configuration
      cisco.nxos.nxos_config:
        backup: true
        backup_options:
          dir_path: "{{ network_backup_dir_resolved }}"
          filename: "{{ network_backup_filename }}"
      register: backup_result
      when: normalized_vendor == 'cisco_nxos'

    - name: Backup Huawei current configuration
      community.network.ce_config:
        backup: true
        backup_options:
          dir_path: "{{ network_backup_dir_resolved }}"
          filename: "{{ network_backup_filename }}"
      register: backup_result
      when: normalized_vendor == 'huawei_ce'

    - name: Read H3C current configuration
      ansible.netcommon.cli_command:
        command: "{{ h3c_backup_command }}"
      register: h3c_backup_result
      changed_when: false
      when: normalized_vendor == 'h3c_cli'

    - name: Save H3C configuration snapshot to local file
      ansible.builtin.copy:
        content: "{{ h3c_backup_result.stdout }}"
        dest: "{{ network_backup_dir_resolved }}/{{ network_backup_filename }}"
        mode: "0644"
      delegate_to: localhost
      register: h3c_backup_copy
      when: normalized_vendor == 'h3c_cli'

    - name: Read F5 logical configuration snapshot
      f5networks.f5_modules.bigip_command:
        commands: "{{ f5_backup_commands }}"
        provider: "{{ f5_provider }}"
        warn: false
      delegate_to: localhost
      register: f5_backup_result
      when: normalized_vendor == 'f5_bigip'

    - name: Save F5 logical configuration snapshot to local file
      ansible.builtin.copy:
        content: |-
          {% for idx in range(f5_backup_commands | length) %}
          ### {{ f5_backup_commands[idx] }}
          {{ f5_backup_result.stdout[idx] | default('') }}

          {% endfor %}
        dest: "{{ network_backup_dir_resolved }}/{{ network_backup_filename }}"
        mode: "0644"
      delegate_to: localhost
      register: f5_backup_copy
      when: normalized_vendor == 'f5_bigip'

    - name: Print backup result
      ansible.builtin.debug:
        msg:
          vendor_family: "{{ normalized_vendor }}"
          inventory_host: "{{ inventory_hostname }}"
          backup_path: >-
            {{
              (
                backup_result.backup_path
                | default(network_backup_dir_resolved ~ '/' ~ network_backup_filename)
              )
              if normalized_vendor in ['cisco_ios', 'cisco_nxos', 'huawei_ce']
              else (network_backup_dir_resolved ~ '/' ~ network_backup_filename)
            }}
