---
- name: Task center ansible hello world
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    default_smoke_message: "ansible example from github"
  tasks:
    - name: Print example message
      debug:
        msg: "{{ smoke_message | default(default_smoke_message) }}"

    - name: Run simple command
      shell: "printf 'ansible-host=%s\n' \"$(hostname)\""
      changed_when: false

    - name: Print completion line
      debug:
        msg: "ansible example completed"
