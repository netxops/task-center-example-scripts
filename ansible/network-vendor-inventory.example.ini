[network_devices]
# Cisco IOS / IOS-XE
cisco-ios-core-01 ansible_host=192.0.2.10 vendor_family=cisco_ios ansible_connection=network_cli ansible_network_os=cisco.ios.ios ansible_user=ops ansible_password=changeme ansible_command_timeout=120

# Cisco NX-OS
cisco-nxos-leaf-01 ansible_host=192.0.2.11 vendor_family=cisco_nxos ansible_connection=network_cli ansible_network_os=cisco.nxos.nxos ansible_user=ops ansible_password=changeme ansible_command_timeout=120

# Huawei CloudEngine
huawei-ce-01 ansible_host=192.0.2.20 vendor_family=huawei_ce ansible_connection=network_cli ansible_network_os=community.network.ce ansible_user=ops ansible_password=changeme ansible_command_timeout=120

# H3C / Comware (generic CLI fallback)
h3c-core-01 ansible_host=192.0.2.21 vendor_family=h3c_cli ansible_connection=network_cli ansible_network_os=ansible.netcommon.default ansible_user=ops ansible_password=changeme ansible_command_timeout=120

# F5 BIG-IP (REST API through localhost)
f5-ltm-01 ansible_host=192.0.2.40 vendor_family=f5_bigip ansible_connection=local ansible_user=admin ansible_password=changeme f5_validate_certs=false
